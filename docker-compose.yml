version: '3.8'

services:
  backend:
    build: ./backend
    container_name: finance_backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: finance_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: finance_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
